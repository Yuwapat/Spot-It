<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YeS Spot It! - เกมจับผิดภาพมัลติเพลเยอร์</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mali: ['Mali', 'cursive'],
          }
        }
      }
    }
  </script>

  <!-- React 18 & Babel CDN (Allows JSX in browser without build steps) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase App & Services (Compat version is best for single-file CDN apps) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Mali', cursive;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.2s ease-in-out 2;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- GAME QUESTIONS WITH PRECISE DIFFERENCES ---
    const GAME_QUESTIONS = [
      {
        id: 1,
        title: 'แคมป์ไฟปริศนาในป่าลึก 🌲⛺',
        imageUrl: 'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=800&q=80',
        differences: [
          { id: 101, x: 82, y: 22, emoji: '🦉', label: 'นกฮูกส่องแสง' },
          { id: 102, x: 22, y: 76, emoji: '🔥', label: 'กองไฟเล็กด้านซ้าย' },
          { id: 103, x: 50, y: 35, emoji: '✨', label: 'ดาวระยิบระยับใจกลางป่า' }
        ]
      },
      {
        id: 2,
        title: 'มหาสมุทรและแนวปะการังสุดหรรษา 🐠🪸',
        imageUrl: 'https://images.unsplash.com/photo-1546026423-cc4642628d2b?auto=format&fit=crop&w=800&q=80',
        differences: [
          { id: 201, x: 74, y: 64, emoji: '🐙', label: 'ปลาหมึกยักษ์สีแดง' },
          { id: 202, x: 28, y: 80, emoji: '🦪', label: 'หอยมุกเรืองแสง' },
          { id: 203, x: 48, y: 24, emoji: '🛸', label: 'จานบินลึกลับใต้น้ำ' }
        ]
      },
      {
        id: 3,
        title: 'ห้องสมุดและหน้าต่างชวนฝัน 📚🐱',
        imageUrl: 'https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=800&q=80',
        differences: [
          { id: 301, x: 24, y: 52, emoji: '🍎', label: 'แอปเปิ้ลวิเศษบนกองหนังสือ' },
          { id: 302, x: 76, y: 32, emoji: '🐱', label: 'แมวส้มหลับปุ๋ย' },
          { id: 303, x: 50, y: 76, emoji: '🪴', label: 'กระถางต้นไม้มีชีวิต' }
        ]
      }
    ];

    // ** คำเตือน: แทนที่ข้อมูลด้านล่างนี้ด้วย Firebase Config ที่ได้จากคอนโซลของคุณเองเพื่อเชื่อมต่อ Database จริง **
   const firebaseConfig = {
  apiKey: "AIzaSyCZjODlm29AmBAzQhLncNG3JwUfVk0CVPk",
  authDomain: "yes-spot-it.firebaseapp.com",
  projectId: "yes-spot-it",
  storageBucket: "yes-spot-it.firebasestorage.app",
  messagingSenderId: "146234789393",
  appId: "1:146234789393:web:ed551f9de0f7edd1892bb0",
  measurementId: "G-SX6MF1XH1D"
};

    let auth, db;
    let isMockDatabase = false;

    try {
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("YOUR_API_KEY_HERE")) {
        throw new Error("API Key is still set to placeholder");
      }
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.warn("Firebase Init failed. Switched to secure Local Simulation Database: ", e.message);
      isMockDatabase = true;

      // Local storage synchronization helpers for simulating real-time database across windows
      const getLocalDB = (key, fallback) => {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : fallback;
      };

      const setLocalDB = (key, val) => {
        localStorage.setItem(key, JSON.stringify(val));
        window.dispatchEvent(new Event('local-db-sync'));
      };

      // Mock Anonymous Auth
      const mockUid = 'mock_player_' + Math.random().toString(36).substring(2, 7).toUpperCase();
      auth = {
        signInAnonymously: () => Promise.resolve({ user: { uid: mockUid } }),
        onAuthStateChanged: (cb) => {
          setTimeout(() => cb({ uid: mockUid }), 50);
          return () => {};
        }
      };

      // Mock Firestore Database Simulator using LocalStorage & Window Events
      db = {
        doc: (path) => {
          const parts = path.split('/');
          const docId = parts[parts.length - 1];
          const isRoom = path.includes('/rooms/');
          const key = isRoom ? `yes_mock_room_${docId}` : `yes_mock_player_${docId}`;

          const listeners = new Set();
          const handleSync = () => {
            const data = getLocalDB(key, null);
            listeners.forEach(cb => cb({
              exists: data !== null,
              data: () => data
            }));
          };

          window.addEventListener('local-db-sync', handleSync);

          return {
            get: () => Promise.resolve({
              exists: getLocalDB(key, null) !== null,
              data: () => getLocalDB(key, null)
            }),
            set: (data) => {
              setLocalDB(key, data);
              return Promise.resolve();
            },
            update: (newData) => {
              const current = getLocalDB(key, {}) || {};
              setLocalDB(key, { ...current, ...newData });
              return Promise.resolve();
            },
            delete: () => {
              localStorage.removeItem(key);
              window.dispatchEvent(new Event('local-db-sync'));
              return Promise.resolve();
            },
            onSnapshot: (callback) => {
              listeners.add(callback);
              setTimeout(handleSync, 50);
              return () => {
                listeners.delete(callback);
                window.removeEventListener('local-db-sync', handleSync);
              };
            }
          };
        },
        collection: (path) => {
          const isPlayers = path.includes('/players');
          const listeners = new Set();

          const handleSync = () => {
            const items = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (isPlayers && key.startsWith('yes_mock_player_')) {
                items.push(JSON.parse(localStorage.getItem(key)));
              } else if (!isPlayers && key.startsWith('yes_mock_room_')) {
                items.push(JSON.parse(localStorage.getItem(key)));
              }
            }
            const docs = items.map(item => ({
              id: item.id || item.roomId,
              data: () => item
            }));
            listeners.forEach(cb => cb({
              forEach: (iterator) => docs.forEach(iterator)
            }));
          };

          window.addEventListener('local-db-sync', handleSync);

          return {
            onSnapshot: (callback) => {
              listeners.add(callback);
              setTimeout(handleSync, 50);
              return () => {
                listeners.delete(callback);
                window.removeEventListener('local-db-sync', handleSync);
              };
            }
          };
        },
        batch: () => {
          const pendingUpdates = [];
          return {
            update: (docRef, data) => {
              pendingUpdates.push({ docRef, data });
            },
            commit: () => {
              pendingUpdates.forEach(up => up.docRef.update(up.data));
              return Promise.resolve();
            }
          };
        }
      };
    }

    const appId = 'yes-spot-it-production';

    // Sound effect synthesis helper
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(140, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.25);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'victory') {
          const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
          notes.forEach((freq, idx) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.12);
            g.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.12);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.12 + 0.25);
            o.start(ctx.currentTime + idx * 0.12);
            o.stop(ctx.currentTime + idx * 0.12 + 0.25);
          });
        }
      } catch (e) {
        console.log('Audio Context error');
      }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null); 
      const [roomCode, setRoomCode] = useState('');
      const [playerName, setPlayerName] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [customBaseUrl, setCustomBaseUrl] = useState('');
      
      const [roomData, setRoomData] = useState(null);
      const [playersList, setPlayersList] = useState([]);
      
      const [foundSpots, setFoundSpots] = useState([]); 
      const [clickMarkers, setClickMarkers] = useState([]); 
      const [myTeam, setMyTeam] = useState(''); 

      const timerRef = useRef(null);

      // Auto-detect browser URL to avoid Sandbox blob link issues
      useEffect(() => {
        const current = window.location.href.split('?')[0];
        if (current.startsWith('blob:') || current.includes('usercontent') || current.includes('preview')) {
          setCustomBaseUrl('https://your-github-username.github.io/your-repo-name');
        } else {
          setCustomBaseUrl(current);
        }
      }, []);

      // Sign-in Anonymous (Simulated or Real)
      useEffect(() => {
        auth.signInAnonymously().catch(e => console.error("Anonymous Sign-In failed", e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // Check URL parameters for QR join automatic route
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
          setRoomCode(roomParam.toUpperCase());
          setRole('player');
        }
      }, []);

      // Listen to room and player state changes
      useEffect(() => {
        if (!user || !roomCode) return;

        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        const unsubscribeRoom = roomDocRef.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            const data = snapshot.data();
            setRoomData(data);
            
            if (role === 'player' && data.status === 'playing') {
              setFoundSpots(data.foundSpotsByPlayers?.[user.uid] || []);
            }
          } else {
            if (role === 'player') {
              setErrorMsg('ไม่พบห้องเล่นเกมนี้ หรือห้องถูกปิดแล้ว');
              setRoomCode('');
              setRole(null);
            }
          }
        }, (err) => {
          console.error("Firestore room error", err);
        });

        const playersColRef = db.collection(`artifacts/${appId}/public/data/players`);
        const unsubscribePlayers = playersColRef.onSnapshot((snapshot) => {
          const allPlayers = [];
          snapshot.forEach((doc) => {
            allPlayers.push({ id: doc.id, ...doc.data() });
          });

          const filtered = allPlayers.filter(p => p.roomId === roomCode);
          setPlayersList(filtered);

          if (role === 'player') {
            const me = filtered.find(p => p.id === user.uid);
            if (me && me.team) {
              setMyTeam(me.team);
            }
          }
        }, (err) => {
          console.error("Firestore players error", err);
        });

        return () => {
          unsubscribeRoom();
          unsubscribePlayers();
        };
      }, [user, roomCode, role]);

      // Instant team distribution calculations
      useEffect(() => {
        if (role === 'player' && roomData?.status === 'ended' && !myTeam && playersList.length > 0) {
          const computedTeam = getLocalTeamAssignment(user.uid, playersList);
          setMyTeam(computedTeam);
          
          db.doc(`artifacts/${appId}/public/data/players/${user.uid}`).update({ team: computedTeam })
            .catch(e => console.log("Failed syncing team", e));
        }
      }, [roomData?.status, myTeam, playersList]);

      const getLocalTeamAssignment = (playerId, players) => {
        const sorted = [...players].sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
        const teachers = sorted.filter(p => p.name.startsWith('ครู'));
        const others = sorted.filter(p => !p.name.startsWith('ครู'));

        const redTeam = [];
        const blueTeam = [];

        teachers.forEach((teacher, idx) => {
          if (idx % 2 === 0) redTeam.push(teacher.id);
          else blueTeam.push(teacher.id);
        });

        others.forEach((player) => {
          if (redTeam.length <= blueTeam.length) redTeam.push(player.id);
          else blueTeam.push(player.id);
        });

        if (redTeam.includes(playerId)) return 'red';
        if (blueTeam.includes(playerId)) return 'blue';
        return 'red';
      };

      useEffect(() => {
        if (role === 'admin' && roomData?.status === 'playing') {
          if (timerRef.current) clearInterval(timerRef.current);
          timerRef.current = setInterval(() => {
            const currentSec = roomData.timeLeft || 60;
            const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
            
            if (currentSec <= 1) {
              clearInterval(timerRef.current);
              handleAdminNextQuestion();
            } else {
              roomDocRef.update({ timeLeft: currentSec - 1 });
            }
          }, 1000);
        }
        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [role, roomData, roomCode]);

      const handleCreateRoom = async () => {
        if (!user) return;
        setErrorMsg('');
        const randomPIN = Math.random().toString(36).substring(2, 7).toUpperCase(); 
        try {
          const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${randomPIN}`);
          await roomDocRef.set({
            roomId: randomPIN,
            status: 'lobby',
            currentQuestionIdx: 0,
            timeLeft: 60,
            createdAt: Date.now()
          });
          setRoomCode(randomPIN);
          setRole('admin');
        } catch (err) {
          setErrorMsg('เกิดข้อผิดพลาดในการสร้างห้อง: ' + err.message);
        }
      };

      const handleAdminStartGame = async () => {
        if (!roomCode) return;
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        await roomDocRef.update({
          status: 'playing',
          currentQuestionIdx: 0,
          timeLeft: 60
        });
      };

      const handleAdminNextQuestion = async () => {
        if (!roomCode || !roomData) return;
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        const nextIdx = roomData.currentQuestionIdx + 1;

        if (nextIdx < GAME_QUESTIONS.length) {
          await roomDocRef.update({
            currentQuestionIdx: nextIdx,
            timeLeft: 60
          });
        } else {
          handleAdminEndAndDivideTeams();
        }
      };

      const handleAdminEndAndDivideTeams = async () => {
        if (!roomCode) return;
        playSound('victory');
        
        const teachers = playersList.filter(p => p.name.startsWith('ครู'));
        const others = playersList.filter(p => !p.name.startsWith('ครู'));

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        const shuffledTeachers = shuffle([...teachers]);
        const shuffledOthers = shuffle([...others]);

        const redTeam = [];
        const blueTeam = [];

        shuffledTeachers.forEach((teacher, idx) => {
          if (idx % 2 === 0) redTeam.push(teacher);
          else blueTeam.push(teacher);
        });

        shuffledOthers.forEach((player) => {
          if (redTeam.length <= blueTeam.length) redTeam.push(player);
          else blueTeam.push(player);
        });

        try {
          const batch = db.batch();
          redTeam.forEach(p => {
            const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
            batch.update(ref, { team: 'red' });
          });
          blueTeam.forEach(p => {
            const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
            batch.update(ref, { team: 'blue' });
          });
          await batch.commit();

          const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
          await roomDocRef.update({ status: 'ended' });
        } catch (e) {
          console.error("Error dividing teams:", e);
        }
      };

      const handleJoinRoom = async (e) => {
        e.preventDefault();
        if (!user) return;
        setErrorMsg('');
        if (!roomCode.trim()) {
          setErrorMsg('กรุณากรอกรหัสห้อง');
          return;
        }
        if (!playerName.trim()) {
          setErrorMsg('กรุณากรอกชื่อเล่นของคุณ');
          return;
        }

        const uppercaseCode = roomCode.trim().toUpperCase();
        
        try {
          const roomSnapshot = await db.doc(`artifacts/${appId}/public/data/rooms/${uppercaseCode}`).get();
          if (!roomSnapshot.exists) {
            setErrorMsg('ไม่พบรหัสห้องนี้ในระบบ กรุณาตรวจสอบรหัสอีกครั้ง');
            return;
          }

          const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
          await playerDocRef.set({
            id: user.uid,
            roomId: uppercaseCode,
            name: playerName.trim(),
            score: 0,
            team: '',
            joinedAt: Date.now()
          });

          setRoomCode(uppercaseCode);
          setRole('player');
        } catch (err) {
          setErrorMsg('เกิดข้อผิดพลาดในการเข้าร่วม: ' + err.message);
        }
      };

      const handleSpotImageClick = async (e) => {
        if (role !== 'player' || !roomData || roomData.status !== 'playing') return;

        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * 100;
        const clickY = ((e.clientY - rect.top) / rect.height) * 100;

        const currentQ = GAME_QUESTIONS[roomData.currentQuestionIdx];
        let matchedDiff = null;

        currentQ.differences.forEach((diff) => {
          const dist = Math.sqrt(Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2));
          if (dist < 12) {
            matchedDiff = diff;
          }
        });

        if (matchedDiff) {
          if (!foundSpots.includes(matchedDiff.id)) {
            playSound('correct');
            const updatedSpots = [...foundSpots, matchedDiff.id];
            setFoundSpots(updatedSpots);

            setClickMarkers((prev) => [
              ...prev,
              { id: matchedDiff.id, x: matchedDiff.x, y: matchedDiff.y, isCorrect: true, emoji: matchedDiff.emoji }
            ]);

            const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
            const currentScore = playersList.find(p => p.id === user.uid)?.score || 0;
            await playerDocRef.update({ score: currentScore + 100 });
          }
        } else {
          playSound('wrong');
          const tempId = Date.now();
          setClickMarkers((prev) => [
            ...prev,
            { id: tempId, x: clickX, y: clickY, isCorrect: false }
          ]);
          setTimeout(() => {
            setClickMarkers((prev) => prev.filter(m => m.id !== tempId));
          }, 1200);
        }
      };

      const handleResetGame = async () => {
        if (role === 'admin' && roomCode) {
          try {
            await db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`).delete();
            setRoomCode('');
            setRole(null);
            setRoomData(null);
            setPlayersList([]);
          } catch (e) {
            console.error(e);
          }
        } else {
          setRoomCode('');
          setRole(null);
          setFoundSpots([]);
          setClickMarkers([]);
          setMyTeam('');
        }
      };

      const joinUrl = `${customBaseUrl}?room=${roomCode}`;

      return (
        <div className="min-h-screen flex flex-col">
          {/* HEADER BANNER */}
          <header className="py-4 px-6 bg-[#013220] border-b-4 border-emerald-800 flex justify-between items-center shadow-2xl">
            <div className="flex items-center gap-3">
              <div className="bg-yellow-400 p-2.5 rounded-2xl transform -rotate-3 shadow-md">
                <span className="text-2xl font-black text-[#013220]">YeS</span>
              </div>
              <div>
                <h1 className="text-2xl font-bold tracking-tight text-white">YeS Spot It! 👁️</h1>
                <p className="text-xs text-green-300">
                  ระบบจับผิดภาพมัลติเพลเยอร์ 
                  {isMockDatabase ? (
                    <span className="ml-2 bg-amber-500/80 text-amber-950 font-bold px-2 py-0.5 rounded text-[10px] animate-pulse">
                      ⚙️ โหมดจำลองความปลอดภัยไร้ Error
                    </span>
                  ) : (
                    " — สแกน QR Code เข้าเล่น"
                  )}
                </p>
              </div>
            </div>
            
            {roomCode && (
              <button
                onClick={handleResetGame}
                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow-md"
              >
                ❌ ออกจากเกม
              </button>
            )}
          </header>

          <main className="flex-grow flex flex-col items-center justify-center p-4">
            {errorMsg && (
              <div className="bg-red-950/80 border-2 border-red-500 text-red-200 px-6 py-3 rounded-2xl mb-4 text-center max-w-md w-full shadow-lg">
                ⚠️ {errorMsg}
              </div>
            )}

            {/* --- SCENE 1: LOGIN --- */}
            {!role && (
              <div className="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 p-4">
                
                {/* ADMIN CARD */}
                <div className="bg-[#013220] border-4 border-emerald-700 rounded-3xl p-8 flex flex-col justify-between shadow-2xl">
                  <div className="text-center">
                    <span className="text-7xl block mb-4">🖥️</span>
                    <h2 className="text-3xl font-bold text-yellow-300 mb-2">หน้าจอแอดมิน</h2>
                    <p className="text-sm text-green-100 mb-6 leading-relaxed">
                      สร้างห้องควบคุมหลัก ฉายโปรเจกเตอร์หน้าห้อง สลับจัดสรรทีมด้วยสัดส่วนผู้เล่น "ครู" ที่เท่ากันแบบเรียลไทม์!
                    </p>
                  </div>
                  <button
                    onClick={handleCreateRoom}
                    className="w-full bg-yellow-400 hover:bg-yellow-300 text-[#013220] py-4 rounded-2xl font-bold text-lg transition-all shadow-lg"
                  >
                    🆕 สร้างห้องควบคุมใหม่
                  </button>
                </div>

                {/* PLAYER CARD */}
                <div className="bg-slate-800 border-4 border-slate-700 rounded-3xl p-8 flex flex-col justify-between shadow-2xl">
                  <form onSubmit={handleJoinRoom} className="space-y-4">
                    <div className="text-center">
                      <span className="text-7xl block mb-4">📱</span>
                      <h2 className="text-3xl font-bold text-white mb-2">จอมือถือผู้เล่น</h2>
                      <p className="text-sm text-slate-300 mb-6 leading-relaxed">
                        สแกน QR Code หรือป้อนพินห้อง กรอกชื่อเล่น แล้วเตรียมจิ้มของแปลกปลอมในโทรศัพท์มือถือของคุณ!
                      </p>
                    </div>

                    <div className="space-y-3">
                      <input
                        type="text"
                        value={roomCode}
                        onChange={(e) => setRoomCode(e.target.value.toUpperCase())}
                        placeholder="ใส่พินห้อง เช่น YES99"
                        className="w-full bg-slate-900 border-2 border-slate-700 text-white rounded-2xl py-3 px-4 text-center text-xl font-bold uppercase tracking-widest focus:outline-none focus:border-yellow-400 transition"
                      />
                      <input
                        type="text"
                        value={playerName}
                        onChange={(e) => setPlayerName(e.target.value)}
                        placeholder="ใส่ชื่อเล่น (ครูแป้ง, ตูน)"
                        className="w-full bg-slate-900 border-2 border-slate-700 text-white rounded-2xl py-3 px-4 text-center font-bold focus:outline-none focus:border-yellow-400 transition"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl font-bold text-lg transition-all"
                    >
                      🚪 เข้าร่วมล็อบบี้
                    </button>
                  </form>
                </div>

              </div>
            )}

            {/* --- SCENE 2: ADMIN LIVE BOARD --- */}
            {role === 'admin' && roomData && (
              <div className="max-w-5xl w-full bg-slate-950 rounded-3xl border-4 border-emerald-800 p-6 shadow-2xl flex flex-col gap-6">
                
                <div className="flex flex-col md:flex-row justify-between items-center bg-[#013220] p-6 rounded-2xl border-2 border-emerald-700 gap-4">
                  <div className="text-center md:text-left">
                    <span className="text-xs text-green-300 font-bold block uppercase tracking-widest">พินเข้าเล่นเกม (Room PIN)</span>
                    <span className="text-6xl font-black text-yellow-300 tracking-widest">{roomCode}</span>
                  </div>

                  <div className="flex items-center gap-4 bg-black/30 p-4 rounded-xl border border-white/10 w-full md:w-auto">
                    <div className="bg-white p-2 rounded-lg shrink-0">
                      <img 
                        src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(joinUrl)}&color=013220`}
                        alt="Scan Join QR Code"
                        className="w-24 h-24"
                      />
                    </div>
                    <div className="text-left text-xs text-gray-300 space-y-2 w-full">
                      <p className="font-bold text-white">📱 สแกน QR Code เข้าเล่น</p>
                      
                      <div className="space-y-1">
                        <label className="text-[10px] text-green-400 font-bold block">🔗 แก้ไขลิงก์จริงของคุณตรงนี้:</label>
                        <input 
                          type="text"
                          value={customBaseUrl}
                          onChange={(e) => setCustomBaseUrl(e.target.value)}
                          placeholder="https://your-domain.github.io/repo"
                          className="w-full bg-black/50 border border-emerald-700/60 rounded-lg px-2.5 py-1 text-[10px] font-mono text-yellow-300 focus:outline-none"
                        />
                      </div>
                      <p className="text-yellow-400 font-mono break-all text-[10px] pt-1">{joinUrl}</p>
                    </div>
                  </div>
                </div>

                {/* Admin: Lobby Wait Screen */}
                {roomData.status === 'lobby' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center border-b border-white/10 pb-4">
                      <h3 className="text-2xl font-bold text-white">👥 ผู้เล่นในห้อง ({playersList.length} คน)</h3>
                      <button
                        onClick={handleAdminStartGame}
                        disabled={playersList.length === 0}
                        className="bg-yellow-400 hover:bg-yellow-300 disabled:bg-gray-700 disabled:text-gray-400 text-[#013220] px-8 py-3.5 rounded-2xl font-bold text-xl shadow-lg"
                      >
                        🚀 เริ่มเกมทันที!
                      </button>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 max-h-[300px] overflow-y-auto p-2">
                      {playersList.map((p) => (
                        <div key={p.id} className="bg-[#013220] border-2 border-emerald-700 px-4 py-3 rounded-2xl text-center shadow-md">
                          <span className="text-lg font-bold text-white block truncate">
                            {p.name.startsWith('ครู') ? '🎓' : '👤'} {p.name}
                          </span>
                        </div>
                      ))}
                      {playersList.length === 0 && (
                        <div className="col-span-full text-center py-16 text-slate-400 text-lg animate-pulse">
                          ⌛ รอผู้เล่นอื่นๆ สแกนพินเข้าร่วม...
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Admin: Playing Game State */}
                {roomData.status === 'playing' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center bg-black/40 p-4 rounded-xl">
                      <div>
                        <span className="text-xs text-slate-400 block">ภาพด่านปัจจุบัน</span>
                        <span className="text-2xl font-bold text-yellow-300">
                          ข้อ {roomData.currentQuestionIdx + 1}/3: {GAME_QUESTIONS[roomData.currentQuestionIdx].title}
                        </span>
                      </div>
                      <div className="text-right">
                        <span className="text-xs text-slate-400 block">เวลาเหลือนับถอยหลัง</span>
                        <span className="text-3xl font-mono font-bold text-red-500">{roomData.timeLeft} วินาที</span>
                      </div>
                    </div>

                    <div className="relative rounded-3xl overflow-hidden border-4 border-emerald-800 bg-black/80 max-w-3xl mx-auto shadow-2xl">
                      <img
                        src={GAME_QUESTIONS[roomData.currentQuestionIdx].imageUrl}
                        alt="Current Map"
                        className="w-full h-[320px] object-cover opacity-70"
                      />
                      <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end p-6">
                        <div className="w-full flex justify-between items-center">
                          <p className="text-md font-bold text-slate-100">
                            🔔 มองหาจุดแปลกปลอมในจอมือถือของคุณด่วน!
                          </p>
                          <button
                            onClick={handleAdminNextQuestion}
                            className="bg-yellow-400 hover:bg-yellow-300 text-[#013220] font-bold px-6 py-2.5 rounded-xl text-sm shadow transition"
                          >
                            {roomData.currentQuestionIdx < GAME_QUESTIONS.length - 1 ? 'ผ่านข้อถัดไป ➡️' : 'สรุปคะแนนจัดทีม 🏆'}
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Leaderboard */}
                    <div className="bg-[#013220]/40 p-5 rounded-2xl border border-emerald-800/60">
                      <h4 className="text-md font-bold text-green-300 mb-3">📈 ตารางคะแนนผู้เล่นสด:</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        {playersList.slice().sort((a,b) => b.score - a.score).map((p, idx) => (
                          <div key={p.id} className="bg-slate-900 px-4 py-2.5 rounded-xl flex justify-between items-center">
                            <span className="text-sm font-bold truncate">
                              <span className="text-yellow-400 mr-1.5">#{idx+1}</span>
                              {p.name}
                            </span>
                            <span className="font-bold text-emerald-400 text-sm">{p.score} pt</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* Admin: Final Divided Teams */}
                {roomData.status === 'ended' && (
                  <div className="space-y-6 text-center">
                    <div className="py-4">
                      <span className="text-7xl block mb-2 animate-bounce">🎉</span>
                      <h2 className="text-4xl font-bold text-yellow-300">เฉลี่ยผลจับคู่แบ่งกลุ่มเสร็จสิ้น!</h2>
                      <p className="text-sm text-slate-300 mt-2">
                        ผู้เล่นที่ใช้ชื่อนำหน้า "ครู" ถูกสุ่มแจกจ่ายและเฉลี่ยเข้าฝั่ง แดง และ น้ำเงิน ให้เท่ากันเพื่อความสมดุล
                      </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                      {/* RED TEAM */}
                      <div className="bg-red-950/80 border-4 border-red-700 rounded-3xl p-6 shadow-xl">
                        <div className="flex justify-between items-center mb-4 border-b border-red-700/40 pb-2">
                          <h3 className="text-2xl font-bold text-red-200">🔴 ทีมสีแดง</h3>
                          <span className="bg-red-800 text-red-100 text-xs px-3 py-1 rounded-full font-bold">
                            {playersList.filter(p => p.team === 'red').length} คน
                          </span>
                        </div>
                        <div className="space-y-2 max-h-[220px] overflow-y-auto">
                          {playersList.filter(p => p.team === 'red').map(p => (
                            <div key={p.id} className="bg-red-900/40 px-3 py-2 rounded-xl flex justify-between items-center">
                              <span className="text-sm font-bold">{p.name.startsWith('ครู') ? '🎓' : '👤'} {p.name}</span>
                              <span className="text-xs text-red-300 font-bold">{p.score} pt</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* BLUE TEAM */}
                      <div className="bg-blue-950/80 border-4 border-blue-700 rounded-3xl p-6 shadow-xl">
                        <div className="flex justify-between items-center mb-4 border-b border-blue-700/40 pb-2">
                          <h3 className="text-2xl font-bold text-blue-200">🔵 ทีมสีน้ำเงิน</h3>
                          <span className="bg-blue-800 text-blue-100 text-xs px-3 py-1 rounded-full font-bold">
                            {playersList.filter(p => p.team === 'blue').length} คน
                          </span>
                        </div>
                        <div className="space-y-2 max-h-[220px] overflow-y-auto">
                          {playersList.filter(p => p.team === 'blue').map(p => (
                            <div key={p.id} className="bg-blue-900/40 px-3 py-2 rounded-xl flex justify-between items-center">
                              <span className="text-sm font-bold">{p.name.startsWith('ครู') ? '🎓' : '👤'} {p.name}</span>
                              <span className="text-xs text-blue-300 font-bold">{p.score} pt</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>

                    <button
                      onClick={handleResetGame}
                      className="bg-white text-[#013220] font-bold px-10 py-4 rounded-2xl text-lg hover:bg-gray-100 transition shadow-lg"
                    >
                      🎮 รีเซ็ตสร้างรอบใหม่
                    </button>
                  </div>
                )}

              </div>
            )}

            {/* --- SCENE 3: MOBILE PLAYER PLAY ZONE --- */}
            {role === 'player' && roomData && (
              <div className="max-w-md w-full bg-slate-950 border-4 border-slate-700 rounded-3xl p-5 shadow-2xl flex flex-col justify-between min-h-[580px] relative">
                
                <div className="bg-slate-900 p-3 rounded-2xl flex justify-between items-center text-xs border border-white/5 mb-4">
                  <span className="font-bold text-slate-200">
                    👤 {playerName} {playerName.startsWith('ครู') && '🎓 (ครู)'}
                  </span>
                  <span className="bg-yellow-400 text-slate-900 font-bold px-3 py-1 rounded-full">
                    {playersList.find(p => p.id === user.uid)?.score || 0} คะแนน
                  </span>
                </div>

                {/* Player: Lobby wait */}
                {roomData.status === 'lobby' && (
                  <div className="flex-grow flex flex-col justify-between py-10">
                    <div className="text-center space-y-4">
                      <span className="text-6xl block animate-bounce">⏳</span>
                      <h3 className="text-2xl font-bold text-white">เข้าร่วมห้องแล้ว!</h3>
                      <p className="text-sm text-slate-300">
                        โปรดจ้องที่หน้าจอโปรเจกเตอร์หน้าห้อง แอดมินกำลังเตรียมกดเริ่มเกม...
                      </p>
                    </div>

                    <div className="bg-[#013220] border-2 border-emerald-700 p-4 rounded-2xl text-center shadow">
                      <span className="text-xs text-green-300 block">สมาชิกร่วมห้องตอนนี้:</span>
                      <span className="text-2xl font-bold text-white">{playersList.length} คน</span>
                    </div>
                  </div>
                )}

                {/* Player: Game active */}
                {roomData.status === 'playing' && (
                  <div className="flex-grow flex flex-col justify-between space-y-4">
                    
                    <div className="text-center text-xs">
                      <p className="text-slate-400">ภาพข้อที่ {roomData.currentQuestionIdx + 1}/3</p>
                      <h4 className="text-md font-bold text-yellow-300">{GAME_QUESTIONS[roomData.currentQuestionIdx].title}</h4>
                    </div>

                    <div className="flex-grow flex flex-col gap-2">
                      {/* Top image (original reference) */}
                      <div className="relative h-28 rounded-xl overflow-hidden border border-white/10 opacity-70">
                        <img 
                          src={GAME_QUESTIONS[roomData.currentQuestionIdx].imageUrl}
                          alt="Original"
                          className="w-full h-full object-cover select-none pointer-events-none"
                        />
                        <div className="absolute top-1 left-1 bg-black/60 text-[9px] text-white px-2 py-0.5 rounded-full font-bold">
                          1. ภาพต้นฉบับด่านบน (เปรียบเทียบ)
                        </div>
                      </div>

                      {/* Bottom image (interactive zone) */}
                      <div className="relative flex-grow h-48 rounded-2xl overflow-hidden border-4 border-yellow-400 shadow-xl">
                        <div className="absolute top-1 left-1 bg-yellow-400 text-[#013220] text-[9px] px-2 py-0.5 rounded-full font-bold z-10">
                          2. จิ้มของแปลกปลอมในภาพล่างที่เพิ่มขึ้นมา! 👇
                        </div>

                        <div 
                          onClick={handleSpotImageClick}
                          className="w-full h-full relative cursor-crosshair overflow-hidden"
                        >
                          <img 
                            src={GAME_QUESTIONS[roomData.currentQuestionIdx].imageUrl}
                            alt="Spot search area"
                            className="w-full h-full object-cover select-none pointer-events-none"
                          />

                          {/* Render spots */}
                          {GAME_QUESTIONS[roomData.currentQuestionIdx].differences.map((diff) => {
                            const isFound = foundSpots.includes(diff.id);
                            return (
                              <div
                                key={diff.id}
                                className="absolute transform -translate-x-1/2 -translate-y-1/2 text-2xl select-none pointer-events-none transition-all duration-300"
                                style={{ 
                                  left: `${diff.x}%`, 
                                  top: `${diff.y}%`,
                                  filter: isFound ? 'grayscale(0) drop-shadow(0 0 6px #22c55e)' : 'grayscale(1) opacity-25'
                                }}
                              >
                                <span>{diff.emoji}</span>
                              </div>
                            );
                          })}

                          {/* Render click markers */}
                          {clickMarkers.map((marker) => {
                            if (marker.isCorrect) {
                              return (
                                <div 
                                  key={marker.id}
                                  className="absolute transform -translate-x-1/2 -translate-y-1/2 border-4 border-red-500 rounded-full animate-pulse z-20"
                                  style={{ 
                                    left: `${marker.x}%`, 
                                    top: `${marker.y}%`, 
                                    width: '42px', 
                                    height: '42px',
                                    boxShadow: '0 0 0 2px #ef4444'
                                  }}
                                />
                              );
                            } else {
                              return (
                                <div 
                                  key={marker.id}
                                  className="absolute transform -translate-x-1/2 -translate-y-1/2 text-xl font-bold text-red-500 z-20 animate-ping"
                                  style={{ left: `${marker.x}%`, top: `${marker.y}%` }}
                                >
                                  ❌
                                </div>
                              );
                            }
                          })}

                        </div>
                      </div>

                    </div>

                    <div className="bg-slate-900 p-2.5 rounded-xl text-center text-xs font-bold text-yellow-300 border border-white/5">
                      🔍 ค้นพบแล้ว {foundSpots.length} จาก {GAME_QUESTIONS[roomData.currentQuestionIdx].differences.length} จุด
                    </div>

                  </div>
                )}

                {/* Player: Game finished and team assigned */}
                {roomData.status === 'ended' && (
                  <div className="flex-grow flex flex-col justify-between py-6 text-center animate-fade-in">
                    
                    <div className="space-y-2">
                      <span className="text-6xl">🏆</span>
                      <h3 className="text-3xl font-bold text-white">สรุปผลจัดสรรทีม!</h3>
                      <p className="text-xs text-slate-300">ตารางแบ่งปันสีทีมของคุณเสร็จสิ้นแล้ว</p>
                    </div>

                    <div className="my-auto py-8">
                      {myTeam === 'red' && (
                        <div className="bg-red-600 border-4 border-red-400 text-white p-6 rounded-3xl shadow-xl transform rotate-1 animate-scale-up">
                          <span className="text-xs uppercase block tracking-widest text-red-100 mb-1 font-bold">ฝั่งทีมของคุณคือ</span>
                          <h4 className="text-4xl font-black">🔴 ทีมสีแดง</h4>
                        </div>
                      )}

                      {myTeam === 'blue' && (
                        <div className="bg-blue-600 border-4 border-blue-400 text-white p-6 rounded-3xl shadow-xl transform -rotate-1 animate-scale-up">
                          <span className="text-xs uppercase block tracking-widest text-blue-100 mb-1 font-bold">ฝั่งทีมของคุณคือ</span>
                          <h4 className="text-4xl font-black">🔵 ทีมสีน้ำเงิน</h4>
                        </div>
                      )}

                      {!myTeam && (
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 animate-pulse text-slate-400">
                          กำลังดึงและเฉลี่ยรายชื่อเข้าสีทีม...
                        </div>
                      )}
                    </div>

                    <div className="bg-black/40 p-3 rounded-xl text-xs text-slate-300">
                      พ้อยต์สะสมทั้งหมด: <span className="font-bold text-yellow-400 text-sm">{playersList.find(p => p.id === user.uid)?.score || 0} pt</span>
                    </div>

                  </div>
                )}

              </div>
            )}
          </main>

          <footer className="bg-[#013220]/80 border-t border-emerald-800 py-3 text-center text-xs text-slate-300">
            © 2026 YeS Spot It Game — Google Mali Font 🇹🇭
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
