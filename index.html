    let auth, db;

    try {

      }
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.warn("Firebase Init failed. Switched to secure Local Simulation Database");
      isMockDatabase = true;

      const getLocalDB = (key, fallback) => {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : fallback;
      };

      const setLocalDB = (key, val) => {
        localStorage.setItem(key, JSON.stringify(val));
        window.dispatchEvent(new Event('local-db-sync'));
      };

      const mockUid = 'mock_player_' + Math.random().toString(36).substring(2, 7).toUpperCase();
      auth = {
        signInAnonymously: () => Promise.resolve({ user: { uid: mockUid } }),
        onAuthStateChanged: (cb) => {
          setTimeout(() => cb({ uid: mockUid }), 50);
          return () => {};
        }
      };

      db = {
        doc: (path) => {
          const parts = path.split('/');
          const docId = parts[parts.length - 1];
          const isRoom = path.includes('/rooms/');
          const key = isRoom ? `yes_mock_room_${docId}` : `yes_mock_player_${docId}`;

          const listeners = new Set();
          const handleSync = () => {
            const data = getLocalDB(key, null);
            listeners.forEach(cb => cb({
              exists: data !== null,
              data: () => data
            }));
          };

          window.addEventListener('local-db-sync', handleSync);

          return {
            get: () => Promise.resolve({
              exists: getLocalDB(key, null) !== null,
              data: () => getLocalDB(key, null)
            }),
            set: (data) => {
              setLocalDB(key, data);
              return Promise.resolve();
            },
            update: (newData) => {
              const current = getLocalDB(key, {}) || {};
              setLocalDB(key, { ...current, ...newData });
              return Promise.resolve();
            },
            delete: () => {
              localStorage.removeItem(key);
              window.dispatchEvent(new Event('local-db-sync'));
              return Promise.resolve();
            },
            onSnapshot: (callback) => {
              listeners.add(callback);
              setTimeout(handleSync, 50);
              return () => {
                listeners.delete(callback);
                window.removeEventListener('local-db-sync', handleSync);
              };
            }
          };
        },
        collection: (path) => {
          const isPlayers = path.includes('/players');
          const listeners = new Set();

          const handleSync = () => {
            const items = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (isPlayers && key.startsWith('yes_mock_player_')) {
                items.push(JSON.parse(localStorage.getItem(key)));
              } else if (!isPlayers && key.startsWith('yes_mock_room_')) {
                items.push(JSON.parse(localStorage.getItem(key)));
              }
            }
            const docs = items.map(item => ({
              id: item.id || item.roomId,
              data: () => item
            }));
            listeners.forEach(cb => cb({
              forEach: (iterator) => docs.forEach(iterator)
            }));
          };

          window.addEventListener('local-db-sync', handleSync);

          return {
            onSnapshot: (callback) => {
              listeners.add(callback);
              setTimeout(handleSync, 50);
              return () => {
                listeners.delete(callback);
                window.removeEventListener('local-db-sync', handleSync);
              };
            }
          };
        },
        batch: () => {
          const pendingUpdates = [];
          return {
            update: (docRef, data) => {
              pendingUpdates.push({ docRef, data });
            },
            commit: () => {
              pendingUpdates.forEach(up => up.docRef.update(up.data));
              return Promise.resolve();
            }
          };
        }
      };
    }

    const appId = 'yes-spot-it-production';

    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(140, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.25);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'victory') {
          const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
          notes.forEach((freq, idx) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.12);
            g.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.12);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.12 + 0.25);
            o.start(ctx.currentTime + idx * 0.12);
            o.stop(ctx.currentTime + idx * 0.12 + 0.25);
          });
        }
      } catch (e) {
        console.warn("Audio Context init failed on click.", e);
      }
    };

      const [myTeam, setMyTeam] = useState(''); 

      const timerRef = useRef(null);

      // Detect Base URL
      useEffect(() => {
        const current = window.location.href.split('?')[0];
        if (current.startsWith('blob:') || current.includes('usercontent') || current.includes('preview')) {
          setCustomBaseUrl('https://yuwapat.github.io/Spot-It/');
        } else {
          setCustomBaseUrl(current);
        }
      }, []);

      // Authenticate
      useEffect(() => {
        auth.signInAnonymously().catch(e => console.error("Anonymous Sign-In failed", e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // SCAN FLOW FIX: Auto pre-fill room code but leave role as null so they must enter their name!
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
          setRoomCode(roomParam.toUpperCase());
          setIsScanAccess(true); // Locks admin hide mode, players will only see the join form!
        }
      }, []);

      // Realtime snapshots
      useEffect(() => {
        if (!user || !roomCode) return;

        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        const unsubscribeRoom = roomDocRef.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            const data = snapshot.data();
            setRoomData(data);
          } else {
            if (role === 'player') {
              setErrorMsg('ไม่พบห้องเล่นเกมนี้ หรือห้องถูกปิดแล้ว');
              setRoomData(null);
            }
          }
        }, (err) => {
          console.error("Firestore room error", err);
        });

        const playersColRef = db.collection(`artifacts/${appId}/public/data/players`);
        const unsubscribePlayers = playersColRef.onSnapshot((snapshot) => {
          const allPlayers = [];
          snapshot.forEach((doc) => {
            allPlayers.push({ id: doc.id, ...doc.data() });
          });

          const filtered = allPlayers.filter(p => p.roomId === roomCode);
          setPlayersList(filtered);

          if (role === 'player') {
            const me = filtered.find(p => p.id === user.uid);
            if (me) {
              if (me.team) {
                setMyTeam(me.team);
              }
              // STRICT BUG FIX 2: Synchronize found spots directly from database profile
              // This prevents state override during room/admin snapshot updates!
              setFoundSpots(me.foundSpots || []);
            }
          }
        }, (err) => {
          console.error("Firestore players error", err);
        });

        return () => {
          unsubscribeRoom();
          unsubscribePlayers();
        };
      }, [user, roomCode, role]);

      // STRICT BUG FIX 1: Reset markers and spots when admin advances the question index
      useEffect(() => {
        if (role === 'player' && roomData) {
          setClickMarkers([]);
          setFoundSpots([]);
          
          // Clear player's foundSpots record in database as well to start with 0
          db.doc(`artifacts/${appId}/public/data/players/${user.uid}`).update({
            foundSpots: []
          }).catch(e => console.warn("Failed resetting DB found spots:", e));
        }
      }, [roomData?.currentQuestionIdx, role]);

      // Team synchronization on end
      useEffect(() => {
        if (role === 'player' && roomData?.status === 'ended' && !myTeam && playersList.length > 0) {
          const computedTeam = getLocalTeamAssignment(user.uid, playersList);
          setMyTeam(computedTeam);
          
          db.doc(`artifacts/${appId}/public/data/players/${user.uid}`).update({ team: computedTeam })
            .catch(e => console.log("Failed syncing team", e));
        }
      }, [roomData?.status, myTeam, playersList]);

      const getLocalTeamAssignment = (playerId, players) => {
        const sorted = [...players].sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
        const teachers = sorted.filter(p => p.name.startsWith('ครู'));
        const others = sorted.filter(p => !p.name.startsWith('ครู'));

        const redTeam = [];
        const blueTeam = [];

        teachers.forEach((teacher, idx) => {
          if (idx % 2 === 0) redTeam.push(teacher.id);
          else blueTeam.push(teacher.id);
        });

        others.forEach((player) => {
          if (redTeam.length <= blueTeam.length) redTeam.push(player.id);
          else blueTeam.push(player.id);
        });

        if (redTeam.includes(playerId)) return 'red';
        if (blueTeam.includes(playerId)) return 'blue';
        return 'red';
      };

      // Timer updates from Admin
      useEffect(() => {
        if (role === 'admin' && roomData?.status === 'playing') {
          if (timerRef.current) clearInterval(timerRef.current);
          timerRef.current = setInterval(() => {
            const currentSec = roomData.timeLeft || 60;
            const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
            
            if (currentSec <= 1) {
              clearInterval(timerRef.current);
              handleAdminNextQuestion();
            } else {
              roomDocRef.update({ timeLeft: currentSec - 1 });
            }
          }, 1000);
        }
        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [role, roomData, roomCode]);

      const handleCreateRoom = async () => {
        if (!user) return;
        setErrorMsg('');
        const randomPIN = Math.random().toString(36).substring(2, 7).toUpperCase(); 
        try {
          const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${randomPIN}`);
          await roomDocRef.set({
            roomId: randomPIN,
            status: 'lobby',
            currentQuestionIdx: 0,
            timeLeft: 60,
            createdAt: Date.now()
          });
          setRoomCode(randomPIN);
          setRole('admin');
        } catch (err) {
          setErrorMsg('เกิดข้อผิดพลาดในการสร้างห้อง: ' + err.message);
        }
      };

      const handleAdminStartGame = async () => {
        if (!roomCode) return;
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        await roomDocRef.update({
          status: 'playing',
          currentQuestionIdx: 0,
          timeLeft: 60
        });
      };

      const handleAdminNextQuestion = async () => {
        if (!roomCode || !roomData) return;
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        const nextIdx = roomData.currentQuestionIdx + 1;

        if (nextIdx < GAME_QUESTIONS.length) {
          await roomDocRef.update({
            currentQuestionIdx: nextIdx,
            timeLeft: 60
          });
        } else {
          handleAdminEndAndDivideTeams();
        }
      };

      const handleAdminEndAndDivideTeams = async () => {
        if (!roomCode) return;
        playSound('victory');
        
        const teachers = playersList.filter(p => p.name.startsWith('ครู'));
        const others = playersList.filter(p => !p.name.startsWith('ครู'));

        const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
        const shuffledTeachers = shuffle([...teachers]);
        const shuffledOthers = shuffle([...others]);

        const redTeam = [];
        const blueTeam = [];

        shuffledTeachers.forEach((teacher, idx) => {
          if (idx % 2 === 0) redTeam.push(teacher);
          else blueTeam.push(teacher);
        });

        shuffledOthers.forEach((player) => {
          if (redTeam.length <= blueTeam.length) redTeam.push(player);
          else blueTeam.push(player);
        });

        try {
          // If players exist, write their team divisions in database
          if (playersList.length > 0) {
            const batch = db.batch();
            redTeam.forEach(p => {
              const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
              batch.update(ref, { team: 'red' });
            });
            blueTeam.forEach(p => {
              const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
              batch.update(ref, { team: 'blue' });
            });
            await batch.commit();
          }

          // In all scenarios, update room state to 'ended' to trigger layout transition!
          const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
          await roomDocRef.update({ status: 'ended' });
        } catch (e) {
          console.error("Error dividing teams:", e);
        }
      };

      const handleJoinRoom = async (e) => {
        if (e) e.preventDefault();
        if (!user) return;
        setErrorMsg('');
        if (!roomCode.trim()) {
          setErrorMsg('กรุณากรอกรหัสห้อง');
          return;
        }
        if (!playerName.trim()) {
          setErrorMsg('กรุณากรอกชื่อเล่นของคุณ');
          return;
        }

        const uppercaseCode = roomCode.trim().toUpperCase();
        
        try {
          const roomSnapshot = await db.doc(`artifacts/${appId}/public/data/rooms/${uppercaseCode}`).get();
          if (!roomSnapshot.exists) {
            setErrorMsg('ไม่พบรหัสห้องนี้ในระบบ กรุณาตรวจสอบรหัสอีกครั้ง');
            return;
          }

          const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
          await playerDocRef.set({
            id: user.uid,
            roomId: uppercaseCode,
            name: playerName.trim(),
            score: 0,
            team: '',
            foundSpots: [],
            joinedAt: Date.now()
          });

          setRoomCode(uppercaseCode);
          setRole('player');
        } catch (err) {
          setErrorMsg('เกิดข้อผิดพลาดในการเข้าร่วม: ' + err.message);
        }
      };

      // SVG absolute-click calculation logic (Fixes scaling / miss clicks)
      const handleSpotImageClick = async (e) => {
        if (role !== 'player' || !roomData || roomData.status !== 'playing') return;

        const rect = e.currentTarget.getBoundingClientRect();
        
        // Convert client click coordinate directly to 400x300 SVG ViewBox coordinates!
        const clickX = ((e.clientX - rect.left) / rect.width) * 400;
        const clickY = ((e.clientY - rect.top) / rect.height) * 300;

        const currentQ = GAME_QUESTIONS[roomData.currentQuestionIdx];
        let matchedDiff = null;

        // Comfortable distance tolerance of 25 pixels inside fixed SVG viewport
        currentQ.differences.forEach((diff) => {
          const dist = Math.sqrt(Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2));
          if (dist < 25) {
            matchedDiff = diff;
          }
        });

        if (matchedDiff) {
          if (!foundSpots.includes(matchedDiff.id)) {
            playSound('correct');
            const updatedSpots = [...foundSpots, matchedDiff.id];
            setFoundSpots(updatedSpots);

            // Record click markers in direct SVG absolute coords!
            setClickMarkers((prev) => [
              ...prev,
              { id: matchedDiff.id, x: matchedDiff.x, y: matchedDiff.y, isCorrect: true }
            ]);

            const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
            const currentScore = playersList.find(p => p.id === user.uid)?.score || 0;
            
            // STRICT BUG FIX 2.1: Write foundSpots directly to DB so real-time updates do not reset it to 0
            await playerDocRef.update({ 
              score: currentScore + 100,
              foundSpots: updatedSpots
            });
          }
        } else {
          playSound('wrong');
          const tempId = Date.now();
          setClickMarkers((prev) => [
            ...prev,
            { id: tempId, x: clickX, y: clickY, isCorrect: false }
          ]);
          setTimeout(() => {
            setClickMarkers((prev) => prev.filter(m => m.id !== tempId));
          }, 1200);
        }
      };

      const handleResetGame = () => {
        if (role === 'admin' && roomCode) {
          db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`).delete()
            .then(() => {
              setRoomCode('');
              setRole(null);
              setRoomData(null);
              setPlayersList([]);
            })
            .catch(e => console.error(e));
        } else {
          setRole(null);
          setFoundSpots([]);
          setClickMarkers([]);
          setMyTeam('');
          if (!isScanAccess) {
            setRoomCode('');
          }
        }
      };

      const joinUrl = `${customBaseUrl}?room=${roomCode}`;

      // Detection
      const isMobileDevice = /Mobi|Android|iPhone|iPad|Macintosh/i.test(navigator.userAgent) && ('ontouchstart' in window || navigator.maxTouchPoints > 0);
      const hideAdminCard = isScanAccess || isMobileDevice;

      return (
        <div className="min-h-screen flex flex-col bg-[#FAF7F2] text-slate-800">
          {/* HEADER BANNER */}
          <header className="py-4 px-6 bg-[#013220] border-b-4 border-emerald-800 flex justify-between items-center shadow-2xl">
            <div className="flex items-center gap-3">
              <div className="bg-yellow-400 p-2.5 rounded-2xl transform -rotate-3 shadow-md">
                <span className="text-2xl font-black text-[#013220]">YeS</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xl">👁️</span>
                <h1 className="text-2xl font-bold tracking-tight text-white">YeS Spot It!</h1>
              </div>
            </div>
            
            {roomCode && (
              <button
                onClick={handleResetGame}
                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow-md flex items-center gap-1"
              >
                🚪 ออกจากเกม
              </button>
            )}
          </header>

          <main className="flex-grow flex flex-col items-center justify-center p-4">
            {errorMsg && (
              <div className="bg-red-50 border-2 border-red-300 text-red-800 px-6 py-3 rounded-2xl mb-4 text-center max-w-md w-full shadow-lg flex items-center gap-3 justify-center">
                <span>⚠️ {errorMsg}</span>
              </div>
            )}

            {/* --- SCENE 1: LOGIN (Warm Cream and Emerald Green Layout) --- */}
            {!role && (
              <div className={`w-full p-4 transition-all duration-300 ${hideAdminCard ? 'max-w-md mx-auto' : 'max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8'}`}>
                
                {/* ADMIN CARD (Keep Emerald Green) */}
                {!hideAdminCard && (
                  <div className="bg-[#013220] border-4 border-emerald-700 rounded-3xl p-8 flex flex-col justify-between shadow-2xl text-white">
                    <div className="text-center flex flex-col items-center">
                      <span className="text-7xl block mb-6 animate-gentle-bounce select-none pointer-events-none">🖥️</span>
                      <h2 className="text-3xl font-bold text-yellow-300 mb-3">หน้าจอแอดมิน</h2>
                      <p className="text-sm text-green-100 mb-6 leading-relaxed">
                        สร้างห้องควบคุมหลัก ฉายโปรเจกเตอร์หน้าห้อง เพื่อเล่นเกมกับเพื่อน ๆ ของคุณ!
                      </p>
                    </div>
                    <button
                      onClick={handleCreateRoom}
                      className="w-full bg-yellow-400 hover:bg-yellow-300 text-[#013220] py-4 rounded-2xl font-bold text-lg transition-all shadow-lg"
                    >
                      สร้างห้องควบคุมใหม่
                    </button>
                  </div>
                )}

                {/* PLAYER CARD (Warm Cream) */}
                <div className="bg-[#FFFDF9] border-4 border-[#EADBC8] rounded-3xl p-8 flex flex-col justify-between shadow-2xl w-full text-slate-800">
                  <form onSubmit={handleJoinRoom} className="space-y-4">
                    <div className="text-center flex flex-col items-center">
                      <span className="text-7xl block mb-6 animate-gentle-bounce select-none pointer-events-none">📱</span>
                      <h2 className="text-3xl font-bold text-[#013220] mb-3">จอมือถือผู้เล่น</h2>
                      <p className="text-sm text-slate-600 mb-6 leading-relaxed">
                        กรอกชื่อเล่นของคุณ และยืนยันพินห้องด้านล่างเพื่อเข้าห้องรอล็อบบี้เตรียมจับผิดภาพ!
                      </p>
                    </div>

                    <div className="space-y-3">
                      <input
                        type="text"
                        value={roomCode}
                        onChange={(e) => setRoomCode(e.target.value.toUpperCase())}
                        placeholder="ใส่พินห้อง เช่น YES99"
                        disabled={isScanAccess} // Locks pin entry from changing if they joined via QR scanning
                        className={`w-full bg-[#FAF7F2] border-2 border-[#EADBC8] text-slate-800 rounded-2xl py-3 px-4 text-center text-xl font-bold uppercase tracking-widest focus:outline-none focus:border-yellow-500 transition ${isScanAccess ? 'opacity-60 cursor-not-allowed bg-slate-100' : ''}`}
                      />
                      <input
                        type="text"
                        value={playerName}
                        onChange={(e) => setPlayerName(e.target.value)}
                        placeholder="ใส่ชื่อเล่น (เช่น ครูแป้ง, ตูน)"
                        className="w-full bg-[#FAF7F2] border-2 border-[#EADBC8] text-slate-800 rounded-2xl py-3 px-4 text-center font-bold focus:outline-none focus:border-yellow-500 transition"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full bg-[#013220] hover:bg-[#0c4e34] text-white py-4 rounded-2xl font-bold text-lg transition-all shadow-lg flex items-center justify-center gap-2"
                    >
                      เข้าร่วมล็อบบี้
                    </button>
                  </form>
                </div>

              </div>
            )}

            {/* --- SCENE 2: ADMIN LIVE BOARD --- */}
            {role === 'admin' && roomData && (
              <div className="max-w-5xl w-full bg-white rounded-3xl border-4 border-emerald-800 p-6 shadow-2xl flex flex-col gap-6 text-slate-800">
                
                <div className="flex flex-col md:flex-row justify-between items-center bg-[#013220] p-6 rounded-2xl border-2 border-emerald-700 gap-4 text-white">
                  <div className="text-center md:text-left">
                    <span className="text-xs text-green-300 font-bold block uppercase tracking-widest">พินเข้าเล่นเกม (Room PIN)</span>
                    <span className="text-6xl font-black text-yellow-300 tracking-widest">{roomCode}</span>
                  </div>

                  <div className="flex items-center gap-4 bg-black/30 p-4 rounded-xl border border-white/10 w-full md:w-auto">
                    <div className="bg-white p-2 rounded-lg shrink-0">
                      <img 
                        src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(joinUrl)}&color=013220`}
                        alt="Scan Join QR Code"
                        className="w-24 h-24"
                      />
                    </div>
                    <div className="text-left text-xs text-gray-300 space-y-2 w-full">
                      <p className="font-bold text-white flex items-center gap-1">
                        📱 สแกน QR Code เข้าเล่น
                      </p>
                      
                      <div className="space-y-1">
                        <label className="text-[10px] text-green-400 font-bold block">🔗 แก้ไขลิงก์ของคุณตรงนี้:</label>
                        <input 
                          type="text"
                          value={customBaseUrl}
                          onChange={(e) => setCustomBaseUrl(e.target.value)}
                          placeholder="https://your-domain.github.io/repo"
                          className="w-full bg-black/50 border border-emerald-700/60 rounded-lg px-2.5 py-1 text-[10px] font-mono text-yellow-300 focus:outline-none"
                        />
                      </div>
                      <p className="text-yellow-400 font-mono break-all text-[10px] pt-1">{joinUrl}</p>
                    </div>
                  </div>
                </div>

                {/* Admin: Lobby Wait Screen */}
                {roomData.status === 'lobby' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center border-b border-slate-200 pb-4">
                      <h3 className="text-2xl font-bold text-[#013220] flex items-center gap-2">
                        👥 ผู้เล่นในห้อง ({playersList.length} คน)
                      </h3>
                      <button
                        onClick={handleAdminStartGame}
                        disabled={playersList.length === 0}
                        className="bg-yellow-400 hover:bg-yellow-300 disabled:bg-slate-200 disabled:text-slate-400 text-[#013220] px-8 py-3.5 rounded-2xl font-bold text-xl shadow-lg flex items-center gap-2 transition-all"
                      >
                        🚀 เริ่มเกมทันที!
                      </button>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 max-h-[300px] overflow-y-auto p-2">
                      {playersList.map((p) => {
                        const isTeacher = p.name.startsWith('ครู');
                        return (
                          <div key={p.id} className="bg-[#FAF7F2] border-2 border-[#EADBC8] px-4 py-3 rounded-2xl text-center shadow-sm flex items-center justify-center gap-2">
                            <span>{isTeacher ? '🎓' : '👤'}</span>
                            <span className="text-lg font-bold text-[#013220] block truncate">
                              {p.name}
                            </span>
                          </div>
                        );
                      })}
                      {playersList.length === 0 && (
                        <div className="col-span-full text-center py-16 text-slate-400 text-lg animate-pulse flex flex-col items-center gap-2">
                          <span>⏱️ รอผู้เล่นอื่น ๆ เข้าร่วมเกม...</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Admin: Playing Game State with side-by-side Peppa-pig-like cartoon layout */}
                {roomData.status === 'playing' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center bg-[#FAF7F2] border-2 border-[#EADBC8] p-4 rounded-2xl">
                      <div>
                        <span className="text-xs text-slate-500 block">ภาพด่านปัจจุบัน</span>
                        <span className="text-2xl font-bold text-[#013220]">
                          ข้อ {roomData.currentQuestionIdx + 1}/3: {GAME_QUESTIONS[roomData.currentQuestionIdx].title}
                        </span>
                      </div>
                      <div className="text-right flex items-center gap-2">
                        <span className="text-3xl font-mono font-bold text-red-600">{roomData.timeLeft} วินาที</span>
                      </div>
                    </div>

                    {/* Desktop/Admin Side-by-Side Cartoon Panels (Exactly like standard find the difference boards) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto">
                      <div className="bg-[#FFFDF9] border-4 border-[#EADBC8] rounded-3xl p-4 shadow-xl flex flex-col items-center">
                        <h4 className="text-md font-bold mb-2 text-[#013220]">ภาพที่ 1: ภาพต้นฉบับ (Original)</h4>
                        <div className="w-full max-w-md aspect-[4/3] bg-[#E8F9FF] rounded-2xl overflow-hidden border-2 border-slate-300">
                          {GAME_QUESTIONS[roomData.currentQuestionIdx].renderSvg(true, null, [], [])}
                        </div>
                      </div>

                      <div className="bg-[#FFFDF9] border-4 border-yellow-400 rounded-3xl p-4 shadow-xl flex flex-col items-center">
                        <h4 className="text-md font-bold mb-2 text-yellow-600">ภาพที่ 2: ค้นหาความแตกต่างซ่อนไว้ (Differences)</h4>
                        <div className="w-full max-w-md aspect-[4/3] bg-[#E8F9FF] rounded-2xl overflow-hidden border-2 border-yellow-400">
                          {GAME_QUESTIONS[roomData.currentQuestionIdx].renderSvg(false, null, playersList.flatMap(p => p.foundSpots || []), [])}
                        </div>
                      </div>
                    </div>

                    <div className="flex justify-between items-center p-4">
                      <p className="text-sm font-bold text-slate-600">
                        👁️ ผู้เล่นกำลังมองหาจุดแตกต่างอยู่ขณะนี้!
                      </p>
                      <button
                        onClick={handleAdminNextQuestion}
                        className="bg-yellow-400 hover:bg-yellow-300 text-[#013220] font-bold px-6 py-2.5 rounded-xl text-sm shadow transition flex items-center gap-1"
                      >
                        <span>{roomData.currentQuestionIdx < GAME_QUESTIONS.length - 1 ? 'ผ่านข้อถัดไป' : 'สรุปคะแนนจัดทีม'}</span>
                      </button>
                    </div>

                    {/* Leaderboard */}
                    <div className="bg-[#FAF7F2] p-5 rounded-2xl border-2 border-[#EADBC8]">
                      <h4 className="text-md font-bold text-[#013220] mb-3 flex items-center gap-2">
                        🏆 ตารางคะแนนผู้เล่น:
                      </h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        {playersList.slice().sort((a,b) => b.score - a.score).map((p, idx) => (
                          <div key={p.id} className="bg-white border border-[#EADBC8] px-4 py-2.5 rounded-xl flex justify-between items-center">
                            <span className="text-sm font-bold truncate flex items-center gap-1 text-slate-700">
                              <span className="text-yellow-600 mr-1">#{idx+1}</span>
                              {p.name}
                            </span>
                            <span className="font-bold text-emerald-700 text-sm">{p.score} pt</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* Admin: Final Divided Teams */}
                {roomData.status === 'ended' && (
                  <div className="space-y-6 text-center">
                    <div className="py-4 flex flex-col items-center">
                      <span className="text-6xl block mb-3 animate-gentle-bounce">🏆</span>
                      <h2 className="text-4xl font-bold text-[#013220]">เฉลี่ยผลจับคู่แบ่งกลุ่มเสร็จสิ้น!</h2>
                      <p className="text-sm text-slate-500 mt-2">
                        ผู้เล่นที่ใช้ชื่อนำหน้า "ครู" ถูกสุ่มแจกจ่ายและเฉลี่ยเข้าฝั่ง แดง และ น้ำเงิน ให้เท่ากันเพื่อความสมดุล
                      </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                      {/* RED TEAM */}
                      <div className="bg-red-50 border-4 border-red-300 rounded-3xl p-6 shadow-xl text-red-900">
                        <div className="flex justify-between items-center mb-4 border-b border-red-200 pb-2">
                          <h3 className="text-2xl font-bold">🔴 ทีมสีแดง</h3>
                          <span className="bg-red-200 text-red-800 text-xs px-3 py-1 rounded-full font-bold">
                            {playersList.filter(p => p.team === 'red').length} คน
                          </span>
                        </div>
                        <div className="space-y-2 max-h-[220px] overflow-y-auto">
                          {playersList.filter(p => p.team === 'red').map(p => {
                            const isTeacher = p.name.startsWith('ครู');
                            return (
                              <div key={p.id} className="bg-white border border-red-200 px-3 py-2 rounded-xl flex justify-between items-center">
                                <span className="text-sm font-bold flex items-center gap-1">
                                  <span>{isTeacher ? '🎓' : '👤'}</span>
                                  {p.name}
                                </span>
                                <span className="text-xs text-red-700 font-bold">{p.score} pt</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* BLUE TEAM */}
                      <div className="bg-blue-50 border-4 border-blue-300 rounded-3xl p-6 shadow-xl text-blue-900">
                        <div className="flex justify-between items-center mb-4 border-b border-blue-200 pb-2">
                          <h3 className="text-2xl font-bold">🔵 ทีมสีน้ำเงิน</h3>
                          <span className="bg-blue-200 text-blue-800 text-xs px-3 py-1 rounded-full font-bold">
                            {playersList.filter(p => p.team === 'blue').length} คน
                          </span>
                        </div>
                        <div className="space-y-2 max-h-[220px] overflow-y-auto">
                          {playersList.filter(p => p.team === 'blue').map(p => {
                            const isTeacher = p.name.startsWith('ครู');
                            return (
                              <div key={p.id} className="bg-white border border-blue-200 px-3 py-2 rounded-xl flex justify-between items-center">
                                <span className="text-sm font-bold flex items-center gap-1">
                                  <span>{isTeacher ? '🎓' : '👤'}</span>
                                  {p.name}
                                </span>
                                <span className="text-xs text-blue-700 font-bold">{p.score} pt</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>

                    <button
                      onClick={handleResetGame}
                      className="bg-[#013220] text-white font-bold px-10 py-4 rounded-2xl text-lg hover:bg-emerald-800 transition shadow-lg inline-flex items-center gap-2"
                    >
                      <span>เล่นเกมใหม่</span>
                    </button>
                  </div>
                )}

              </div>
            )}

            {/* --- SCENE 3: MOBILE PLAYER PLAY ZONE (Cream Base) --- */}
            {role === 'player' && (
              <div className="max-w-md w-full bg-[#FFFDF9] border-4 border-[#EADBC8] rounded-3xl p-5 shadow-2xl flex flex-col justify-between min-h-[580px] relative text-slate-800">
                
                {/* STRICT BUG FIX 3: HUD ของผู้เล่น พร้อมนาฬิกานับถอยหลังเรียลไทม์ที่ซิงก์จากแอดมิน */}
                <div className="bg-[#FAF7F2] p-3 rounded-2xl flex justify-between items-center text-xs border border-[#EADBC8] mb-4">
                  <span className="font-bold text-[#013220] flex items-center gap-1">
                    <span>{playerName.startsWith('ครู') ? '🎓' : '👤'}</span>
                    <span>{playerName || 'กำลังป้อนข้อมูล...'}</span>
                  </span>
                  <div className="flex items-center gap-2">
                    {roomData?.status === 'playing' && (
                      <span className="bg-red-100 text-red-700 font-mono font-bold px-2.5 py-1 rounded-lg border border-red-200 animate-pulse flex items-center gap-1">
                        ⏱️ {roomData.timeLeft}s
                      </span>
                    )}
                    <span className="bg-yellow-400 text-[#013220] font-bold px-3 py-1 rounded-full shadow">
                      {playersList.find(p => p.id === user.uid)?.score || 0} คะแนน
                    </span>
                  </div>
                </div>

                {/* ในกรณียังไม่มีห้อง หรือ หาห้องไม่พบ */}
                {!roomData && (
                  <div className="flex-grow flex flex-col justify-center py-10 text-center space-y-4">
                    <span className="text-6xl block animate-gentle-bounce select-none pointer-events-none">⚠️</span>
                    <h3 className="text-2xl font-bold text-[#013220]">ต้องการเข้าร่วมห้อง</h3>
                    <p className="text-sm text-slate-600 leading-relaxed">
                      กรุณาป้อนรหัสพินห้องและชื่อเล่นของคุณอีกครั้ง หรือรอกรรมการแอดมินเปิดระบบสัญญาณในห้องควบคุมหลักครับ
                    </p>
                    <div className="bg-[#FAF7F2] p-4 rounded-2xl border border-[#EADBC8] space-y-3">
                      <input
                        type="text"
                        value={roomCode}
                        onChange={(e) => setRoomCode(e.target.value.toUpperCase())}
                        placeholder="รหัสพินห้อง เช่น YES99"
                        className="w-full bg-white border border-[#EADBC8] text-slate-800 rounded-xl py-2.5 px-3 text-center font-bold tracking-widest uppercase focus:outline-none"
                      />
                      <input
                        type="text"
                        value={playerName}
                        onChange={(e) => setPlayerName(e.target.value)}
                        placeholder="ชื่อเล่นของคุณ"
                        className="w-full bg-white border border-[#EADBC8] text-slate-800 rounded-xl py-2.5 px-3 text-center font-bold focus:outline-none"
                      />
                      <button
                        onClick={handleJoinRoom}
                        className="w-full bg-[#013220] text-white hover:bg-emerald-800 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1 transition"
                      >
                        ยืนยันเข้าร่วมห้องอีกครั้ง
                      </button>
                    </div>
                  </div>
                )}

                {/* Player: Lobby wait */}
                {roomData && roomData.status === 'lobby' && (
                  <div className="flex-grow flex flex-col justify-between py-10">
                    <div className="text-center space-y-4">
                      <span className="text-6xl block animate-gentle-bounce select-none pointer-events-none">⏳</span>
                      <h3 className="text-2xl font-bold text-[#013220]">เข้าร่วมห้องแล้ว!</h3>
                      <p className="text-sm text-slate-600">
                        โปรดจ้องที่หน้าจอโปรเจกเตอร์หน้าห้อง เกมกำลังจะเริ่ม...
                      </p>
                    </div>

                    <div className="bg-[#013220] p-4 rounded-2xl text-center shadow text-white">
                      <span className="text-xs text-green-300 block">สมาชิกร่วมห้องตอนนี้:</span>
                      <span className="text-2xl font-bold">{playersList.length} คน</span>
                    </div>
                  </div>
                )}

                {/* Player: Game active with identical aspect-ratio card stack */}
                {roomData && roomData.status === 'playing' && (
                  <div className="flex-grow flex flex-col justify-between space-y-4">
                    
                    <div className="text-center text-xs">
                      <p className="text-slate-500">ภาพข้อที่ {roomData.currentQuestionIdx + 1}/3</p>
                      <h4 className="text-md font-bold text-[#013220]">{GAME_QUESTIONS[roomData.currentQuestionIdx].title}</h4>
                    </div>

                    {/* Both reference and interactive boards are styled with identical aspect ratios and viewport bounds */}
                    <div className="flex-grow flex flex-col justify-center gap-3">
                      
                      {/* Top image (original reference) - Sized perfectly equal */}
                      <div className="relative aspect-[4/3] w-full max-w-xs mx-auto rounded-2xl overflow-hidden border-4 border-slate-300 shadow bg-[#E8F9FF] shrink-0">
                        {GAME_QUESTIONS[roomData.currentQuestionIdx].renderSvg(true, null, [], [])}
                        <div className="absolute top-2 left-2 bg-black/70 text-[9px] text-white px-2 py-0.5 rounded-full font-bold z-10">
                          1. ภาพต้นฉบับ (เปรียบเทียบ)
                        </div>
                      </div>

                      {/* Bottom image (interactive zone) - Identical dimensions to the reference panel */}
                      <div className="relative aspect-[4/3] w-full max-w-xs mx-auto rounded-2xl overflow-hidden border-4 border-yellow-400 shadow-2xl bg-[#E8F9FF] shrink-0">
                        <div className="absolute top-2 left-2 bg-yellow-400 text-[#013220] text-[9px] px-2 py-0.5 rounded-full font-bold z-10 flex items-center gap-1">
                          <span>👆</span>
                          <span>2. จิ้มความต่างที่ภาพ! 👇</span>
                        </div>

                        {GAME_QUESTIONS[roomData.currentQuestionIdx].renderSvg(
                          false, 
                          handleSpotImageClick, 
                          foundSpots, 
                          clickMarkers
                        )}
                      </div>

                    </div>

                    <div className="bg-[#FAF7F2] p-2.5 rounded-xl text-center text-xs font-bold text-[#013220] border border-[#EADBC8] shrink-0">
                      🔍 ค้นพบแล้ว {foundSpots.length} จาก {GAME_QUESTIONS[roomData.currentQuestionIdx].differences.length} จุด
                    </div>

                  </div>
                )}

                {/* Player: Game finished and team assigned */}
                {roomData && roomData.status === 'ended' && (
                  <div className="flex-grow flex flex-col justify-between py-6 text-center animate-fade-in">
                    
                    <div className="space-y-2 flex flex-col items-center">
                      <span className="text-6xl block animate-gentle-bounce select-none pointer-events-none">🏆</span>
                      <h3 className="text-3xl font-bold text-[#013220]">สรุปผลจัดสรรทีม!</h3>
                      <p className="text-xs text-slate-500">ตารางแบ่งทีมของคุณเสร็จสิ้นแล้ว</p>
                    </div>

                    <div className="my-auto py-8">
                      {myTeam === 'red' && (
                        <div className="bg-red-600 border-4 border-red-400 text-white p-6 rounded-3xl shadow-xl transform rotate-1">
                          <span className="text-xs uppercase block tracking-widest text-red-100 mb-1 font-bold">ฝั่งทีมของคุณคือ</span>
                          <h4 className="text-4xl font-black">🔴 ทีมสีแดง</h4>
                        </div>
                      )}

                      {myTeam === 'blue' && (
                        <div className="bg-blue-600 border-4 border-blue-400 text-white p-6 rounded-3xl shadow-xl transform -rotate-1">
                          <span className="text-xs uppercase block tracking-widest text-blue-100 mb-1 font-bold">ทีมของคุณคือ</span>
                          <h4 className="text-4xl font-black">🔵 ทีมสีน้ำเงิน</h4>
                        </div>
                      )}

                      {!myTeam && (
                        <div className="bg-[#FAF7F2] p-6 rounded-3xl border border-[#EADBC8] animate-pulse text-slate-500 flex flex-col items-center gap-2">
                          <span>⏳ กำลังแบ่งทีม...</span>
                        </div>
                      )}
                    </div>

                    <div className="bg-[#FAF7F2] p-3 rounded-xl text-xs text-slate-600 flex items-center justify-center gap-1 border border-[#EADBC8]">
                      <span>⭐ คะแนนสะสมทั้งหมด:</span>
                      <span className="font-bold text-yellow-600 text-sm">{playersList.find(p => p.id === user.uid)?.score || 0} pt</span>
                    </div>

                  </div>
                )}

              </div>
            )}
          </main>

          <footer className="bg-[#013220] py-3 text-center text-xs text-slate-300">
            © 2026 YeS Spot It Game — Yuwapat Early Childhood School
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
