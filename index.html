        }
      },
      {
        id: 2,

        differences: [
          { id: 201, x: 90, y: 90, label: 'วงแหวนนีออนรอบดาวเคราะห์หายไป' },

          { id: 203, x: 200, y: 220, label: 'พระจันทร์เสี้ยวสีทองดวงใหญ่หายไป' }
        ],
        renderSvg: (isOriginal, foundSpots = [], clickMarkers = []) => {
          return `
            <svg viewBox="0 0 400 300" class="w-full h-full select-none cursor-crosshair relative">
              <rect width="400" height="300" fill="#0E1525" />
              <circle cx="50" cy="50" r="1.5" fill="#FFFFFF" opacity="0.6" />

              ${(isOriginal || foundSpots.includes(201)) ? `<ellipse cx="90" cy="90" rx="58" ry="16" fill="none" stroke="#00F0FF" stroke-width="8" transform="rotate(-18 90 90)" opacity="0.95" />` : ''}
              <g transform="translate(20, -10)">
                <path d="M 240 160 L 320 120 L 280 80 Z" fill="#E2F0F9" />
                <path d="M 320 120 L 340 125 L 325 105 Z" fill="#FF2E93" />
                <path d="M 240 160 L 220 190 L 255 175 Z" fill="#FF2E93" />

                <circle cx="290" cy="110" r="14" fill="#FFE227" stroke="#333333" stroke-width="2" />
              </g>
              ${(isOriginal || foundSpots.includes(202)) ? `
                <g>
                  <ellipse cx="300" cy="115" rx="18" ry="14" fill="#95E1D3" />
                  <circle cx="293" cy="112" r="4" fill="#000000" />
                  <circle cx="307" cy="112" r="4" fill="#000000" />
                  <circle cx="292" cy="110" r="1" fill="#FFFFFF" />
                  <circle cx="306" cy="110" r="1" fill="#FFFFFF" />
                  <path d="M 300 101 Q 295 90 300 85" fill="none" stroke="#95E1D3" stroke-width="3" />
                  <circle cx="300" cy="83" r="4.5" fill="#FFE227" />
                  <path d="M 288 128 C 288 120, 312 120, 312 128 L 310 142 L 290 142 Z" fill="#6C5CE7" />
                  <path d="M 312 124 Q 326 112 320 106" fill="none" stroke="#95E1D3" stroke-width="4.5" stroke-linecap="round" />
                </g>
              ` : ''}
              ${(isOriginal || foundSpots.includes(203)) ? `<path d="M 185 200 C 220 200, 230 235, 205 250 C 235 240, 230 205, 185 200 Z" fill="#FFE227" stroke="#D8B200" stroke-width="2.5" />` : ''}
              ${foundSpots.map(id => {
                const diff = GAME_QUESTIONS[1].differences.find(d => d.id === id);
                if (!diff) return '';
                return `<ellipse cx="${diff.x}" cy="${diff.y}" rx="26" ry="20" fill="none" stroke="#EF4444" stroke-width="3.5" transform="rotate(3)" style="transform-origin: ${diff.x}px ${diff.y}px;" />`;
              }).join('')}
              ${clickMarkers.map(m => m.isCorrect ? `<ellipse cx="${m.x}" cy="${m.y}" rx="26" ry="20" fill="none" stroke="#EF4444" stroke-width="3.5" />` : `<text x="${m.x}" y="${m.y}" text-anchor="middle" dominant-baseline="middle" fill="#EF4444" font-size="22" font-weight="bold">❌</text>`).join('')}
            </svg>
          `;
        }
      },
      {
        id: 3,
        title: 'สวนป่ากับเห็ดวิเศษ 🍄',
        differences: [
          { id: 301, x: 200, y: 185, label: 'จุดสีขาวบนร่มเห็ดแดงหายไป' },
          { id: 302, x: 24, y: 120, label: 'ผลแอปเปิ้ลสีแดงบนต้นไม้หายไป' },
          { id: 303, x: 305, y: 95, label: 'ผีเสื้อบินหายไป' }
        ],
        renderSvg: (isOriginal, foundSpots = [], clickMarkers = []) => {
          return `
            <svg viewBox="0 0 400 300" class="w-full h-full select-none cursor-crosshair relative">
              <rect width="400" height="220" fill="#E8F9FF" />
              <path d="M -20 220 Q 150 180 420 220 L 420 300 L -20 300 Z" fill="#95CD41" />
              <path d="M -20 240 Q 200 210 420 250 L 420 300 L -20 300 Z" fill="#74B42E" />

              <circle cx="85" cy="115" r="35" fill="#3E7C17" />

              ${(isOriginal || foundSpots.includes(302)) ? `<circle cx="24" cy="120" r="7" fill="#FF4C4C" />` : ''}

              <circle cx="200" cy="165" r="5" fill="#FFFFFF" />
              <circle cx="175" cy="180" r="4" fill="#FFFFFF" />
              <circle cx="225" cy="180" r="4" fill="#FFFFFF" />
              ${(isOriginal || foundSpots.includes(301)) ? `

              <circle cx="158" cy="238" r="9" fill="#059669" />
              <circle cx="155" cy="234" r="1" fill="#000000" />
              <circle cx="161" cy="234" r="1" fill="#000000" />
              ${(isOriginal || foundSpots.includes(303)) ? `
                <g transform="translate(290, 80)">
                  <ellipse cx="15" cy="15" rx="4" ry="12" fill="#6C5CE7" />
                  <path d="M 15 10 C 25 0, 40 5, 25 15 Z" fill="#FF7597" />
                  <path d="M 15 12 C 25 22, 35 18, 22 15 Z" fill="#FF7597" />
                  <path d="M 15 10 C 5 0, -10 5, 5 15 Z" fill="#FF7597" />
                  <path d="M 15 12 C 5 22, -5 18, 8 15 Z" fill="#FF7597" />
                </g>
              ` : ''}
              ${foundSpots.map(id => {
                const diff = GAME_QUESTIONS[2].differences.find(d => d.id === id);
                if (!diff) return '';
                return `<ellipse cx="${diff.x}" cy="${diff.y}" rx="24" ry="18" fill="none" stroke="#EF4444" stroke-width="3.5" style="transform-origin: ${diff.x}px ${diff.y}px;" />`;
              }).join('')}
              ${clickMarkers.map(m => m.isCorrect ? `<ellipse cx="${m.x}" cy="${m.y}" rx="24" ry="18" fill="none" stroke="#EF4444" stroke-width="3.5" />` : `<text x="${m.x}" y="${m.y}" text-anchor="middle" dominant-baseline="middle" fill="#EF4444" font-size="22" font-weight="bold">❌</text>`).join('')}
            </svg>
          `;
        }
      }
    ];

    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyCZjODlm29AmBAzQhLncNG3JwUfVk0CVPk",
      authDomain: "yes-spot-it.firebaseapp.com",
      projectId: "yes-spot-it",
      storageBucket: "yes-spot-it.firebasestorage.app",
      messagingSenderId: "146234789393",
      appId: "1:146234789393:web:ed551f9de0f7edd1892bb0",
      measurementId: "G-SX6MF1XH1D"
    };

    const appId = 'yes-spot-it-production';
    let auth, db, user = null;
    let role = null; // 'admin' | 'player' | null
    let roomCode = '';
    let playerName = '';
    let roomData = null;
    let playersList = [];
    let foundSpots = [];
    let clickMarkers = [];
    let myTeam = '';
    let isScanAccess = false;
    let customBaseUrl = 'https://yuwapat.github.io/Spot-It/';
    let timerInterval = null;

    // --- SOUND SYNTHESIZER ---
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(140, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.25);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'victory') {
          const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
          notes.forEach((freq, idx) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.12);
            g.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.12);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.12 + 0.25);
            o.start(ctx.currentTime + idx * 0.12);
            o.stop(ctx.currentTime + idx * 0.12 + 0.25);
          });
        }
      } catch (e) {
        console.warn("Audio Context init failed on click.", e);
      }
    };

    // --- ROUTER / STATE CONTROLLER ---
    function updateState(newState) {
      if (newState.role !== undefined) role = newState.role;
      if (newState.roomCode !== undefined) roomCode = newState.roomCode;
      if (newState.playerName !== undefined) playerName = newState.playerName;
      if (newState.roomData !== undefined) roomData = newState.roomData;
      if (newState.playersList !== undefined) playersList = newState.playersList;
      if (newState.foundSpots !== undefined) foundSpots = newState.foundSpots;
      if (newState.clickMarkers !== undefined) clickMarkers = newState.clickMarkers;
      if (newState.myTeam !== undefined) myTeam = newState.myTeam;
      if (newState.isScanAccess !== undefined) isScanAccess = newState.isScanAccess;
      
      renderApp();
    }

    // --- ACTIONS: ADMIN ---
    async function handleCreateRoom() {
      if (!user) return;
      showError('');
      const randomPIN = Math.random().toString(36).substring(2, 7).toUpperCase(); 
      try {
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${randomPIN}`);
        await roomDocRef.set({
          roomId: randomPIN,
          status: 'lobby',
          currentQuestionIdx: 0,
          timeLeft: 60,
          createdAt: Date.now()
        });
        updateState({ roomCode: randomPIN, role: 'admin' });
        listenToRoomData(randomPIN);
      } catch (err) {
        showError('เกิดข้อผิดพลาดในการสร้างห้อง: ' + err.message);
      }
    }

    async function handleAdminStartGame() {
      if (!roomCode) return;
      const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
      await roomDocRef.update({
        status: 'playing',
        currentQuestionIdx: 0,
        timeLeft: 60
      });
    }

    async function handleAdminNextQuestion() {
      if (!roomCode || !roomData) return;
      const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
      const nextIdx = roomData.currentQuestionIdx + 1;

      if (nextIdx < GAME_QUESTIONS.length) {
        await roomDocRef.update({
          currentQuestionIdx: nextIdx,
          timeLeft: 60
        });
      } else {
        handleAdminEndAndDivideTeams();
      }
    }

    async function handleAdminEndAndDivideTeams() {
      if (!roomCode) return;
      playSound('victory');
      
      const teachers = playersList.filter(p => p.name.startsWith('ครู'));
      const others = playersList.filter(p => !p.name.startsWith('ครู'));

      const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
      const shuffledTeachers = shuffle([...teachers]);
      const shuffledOthers = shuffle([...others]);

      const redTeam = [];
      const blueTeam = [];

      shuffledTeachers.forEach((teacher, idx) => {
        if (idx % 2 === 0) redTeam.push(teacher);
        else blueTeam.push(teacher);
      });

      shuffledOthers.forEach((player) => {
        if (redTeam.length <= blueTeam.length) redTeam.push(player);
        else blueTeam.push(player);
      });

      try {
        if (playersList.length > 0) {
          const batch = db.batch();
          redTeam.forEach(p => {
            const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
            batch.update(ref, { team: 'red' });
          });
          blueTeam.forEach(p => {
            const ref = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);
            batch.update(ref, { team: 'blue' });
          });
          await batch.commit();
        }

        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        await roomDocRef.update({ status: 'ended' });
      } catch (e) {
        console.error("Error dividing teams:", e);
      }
    }

    // --- ACTIONS: PLAYER ---
    async function handleJoinRoom() {
      if (!user) return;
      showError('');
      
      const inputCode = document.getElementById('input-room-code')?.value.toUpperCase() || roomCode;
      const inputName = document.getElementById('input-player-name')?.value || playerName;

      if (!inputCode) {
        showError('กรุณากรอกรหัสห้อง');
        return;
      }
      if (!inputName) {
        showError('กรุณากรอกชื่อเล่นของคุณ');
        return;
      }

      try {
        const roomSnapshot = await db.doc(`artifacts/${appId}/public/data/rooms/${inputCode}`).get();
        if (!roomSnapshot.exists) {
          showError('ไม่พบรหัสห้องนี้ในระบบ กรุณาตรวจสอบรหัสอีกครั้ง');
          return;
        }

        const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
        await playerDocRef.set({
          id: user.uid,
          roomId: inputCode,
          name: inputName.trim(),
          score: 0,
          team: '',
          foundSpots: [],
          joinedAt: Date.now()
        });

        updateState({ roomCode: inputCode, playerName: inputName.trim(), role: 'player' });
        listenToRoomData(inputCode);
      } catch (err) {
        showError('เกิดข้อผิดพลาดในการเข้าร่วม: ' + err.message);
      }
    }

    async function handleSpotImageClick(e) {
      if (role !== 'player' || !roomData || roomData.status !== 'playing') return;

      const rect = e.currentTarget.getBoundingClientRect();
      const clickX = ((e.clientX - rect.left) / rect.width) * 400;
      const clickY = ((e.clientY - rect.top) / rect.height) * 300;

      const currentQ = GAME_QUESTIONS[roomData.currentQuestionIdx];
      let matchedDiff = null;

      currentQ.differences.forEach((diff) => {
        const dist = Math.sqrt(Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2));
        if (dist < 25) {
          matchedDiff = diff;
        }
      });

      if (matchedDiff) {
        if (!foundSpots.includes(matchedDiff.id)) {
          playSound('correct');
          const updatedSpots = [...foundSpots, matchedDiff.id];
          updateState({ foundSpots: updatedSpots });

          // Add temporary click marker
          const correctMarker = { id: matchedDiff.id, x: matchedDiff.x, y: matchedDiff.y, isCorrect: true };
          updateState({ clickMarkers: [...clickMarkers, correctMarker] });

          const playerDocRef = db.doc(`artifacts/${appId}/public/data/players/${user.uid}`);
          const myProfile = playersList.find(p => p.id === user.uid);
          const currentScore = myProfile ? myProfile.score : 0;
          
          await playerDocRef.update({ 
            score: currentScore + 100,
            foundSpots: updatedSpots
          });
        }
      } else {
        playSound('wrong');
        const tempId = Date.now();
        const wrongMarker = { id: tempId, x: clickX, y: clickY, isCorrect: false };
        updateState({ clickMarkers: [...clickMarkers, wrongMarker] });
        setTimeout(() => {
          updateState({ clickMarkers: clickMarkers.filter(m => m.id !== tempId) });
        }, 1200);
      }
    }

    function handleResetGame() {
      if (role === 'admin' && roomCode) {
        db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`).delete()
          .then(() => {
            if (timerInterval) clearInterval(timerInterval);
            updateState({ roomCode: '', role: null, roomData: null, playersList: [] });
          })
          .catch(e => console.error(e));
      } else {
        updateState({ role: null, foundSpots: [], clickMarkers: [], myTeam: '' });
        if (!isScanAccess) {
          updateState({ roomCode: '' });
        }
      }
    }

    // --- DB LISTENER WRAPPERS ---
    let roomUnsubscribe = null;
    let playersUnsubscribe = null;

    function listenToRoomData(code) {
      if (roomUnsubscribe) roomUnsubscribe();
      if (playersUnsubscribe) playersUnsubscribe();

      const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${code}`);
      roomUnsubscribe = roomDocRef.onSnapshot((snapshot) => {
        if (snapshot.exists) {
          const data = snapshot.data();
          
          // Check if question changed to reset player's local graphics
          if (roomData && roomData.currentQuestionIdx !== data.currentQuestionIdx) {
            updateState({ clickMarkers: [], foundSpots: [] });
            if (role === 'player') {
              db.doc(`artifacts/${appId}/public/data/players/${user.uid}`).update({
                foundSpots: []
              }).catch(e => console.warn(e));
            }
          }
          
          updateState({ roomData: data });

          // Synchronize admin countdown timer
          if (role === 'admin' && data.status === 'playing') {
            startAdminTimer();
          } else {
            if (timerInterval) clearInterval(timerInterval);
          }
        } else {
          if (role === 'player') {
            showError('ไม่พบห้องเล่นเกมนี้ หรือห้องถูกปิดแล้ว');
            updateState({ roomData: null, role: null });
          }
        }
      }, (err) => console.error(err));

      const playersColRef = db.collection(`artifacts/${appId}/public/data/players`);
      playersUnsubscribe = playersColRef.onSnapshot((snapshot) => {
        const allPlayers = [];
        snapshot.forEach((doc) => {
          allPlayers.push({ id: doc.id, ...doc.data() });
        });

        const filtered = allPlayers.filter(p => p.roomId === code);
        updateState({ playersList: filtered });

        if (role === 'player') {
          const me = filtered.find(p => p.id === user.uid);
          if (me) {
            if (me.team) {
              updateState({ myTeam: me.team });
            }
            updateState({ foundSpots: me.foundSpots || [] });
          }
        }
      }, (err) => console.error(err));
    }

    function startAdminTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!roomData || roomData.status !== 'playing' || role !== 'admin') {
          clearInterval(timerInterval);
          return;
        }
        const currentSec = roomData.timeLeft || 60;
        const roomDocRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomCode}`);
        
        if (currentSec <= 1) {
          clearInterval(timerInterval);
          handleAdminNextQuestion();
        } else {
          roomDocRef.update({ timeLeft: currentSec - 1 });
        }
      }, 1000);
    }

    // Helper error box
    function showError(msg) {
      const errBox = document.getElementById('error-box');
      if (errBox) {
        if (msg) {
          errBox.innerHTML = `<span>⚠️ ${msg}</span>`;
          errBox.classList.remove('hidden');
        } else {
          errBox.classList.add('hidden');
        }
      }
    }

                </div>

                <!-- Bottom image (interactive) -->
                <div id="interactive-panel-container" class="relative aspect-[4/3] w-full max-w-xs mx-auto rounded-2xl overflow-hidden border-4 border-yellow-400 shadow-2xl bg-[#E8F9FF] shrink-0">
                  <div class="absolute top-2 left-2 bg-yellow-400 text-[#013220] text-[9px] px-2 py-0.5 rounded-full font-bold z-10 flex items-center gap-1">
                    <span>👆</span>
                    <span>2. หาความต่างของภาพ! 👇</span>
                  </div>
                  ${currentQ.renderSvg(false, foundSpots, clickMarkers)}
                </div>
              </div>

              <div class="bg-[#FAF7F2] p-2.5 rounded-xl text-center text-xs font-bold text-[#013220] border border-[#EADBC8] shrink-0">
                🔍 ค้นพบแล้ว ${foundSpots.length} จาก ${currentQ.differences.length} จุด
              </div>

            </div>
          `;
        } else if (roomData.status === 'ended') {
          mainHtml += `
            <div class="flex-grow flex flex-col justify-between py-6 text-center">
              <div class="space-y-2 flex flex-col items-center">
                <span class="text-6xl block animate-gentle-bounce select-none pointer-events-none">🏆</span>
                <h3 class="text-3xl font-bold text-[#013220]">สรุปผลจัดสรรทีม!</h3>
                <p class="text-xs text-slate-500">การแบ่งทีมของคุณเสร็จสิ้นแล้ว</p>
              </div>

              <div class="my-auto py-8">
                ${myTeam === 'red' ? `
                  <div class="bg-red-600 border-4 border-red-400 text-white p-6 rounded-3xl shadow-xl transform rotate-1">
                    <span class="text-xs uppercase block tracking-widest text-red-100 mb-1 font-bold">ฝั่งทีมของคุณคือ</span>
                    <h4 class="text-4xl font-black">🔴 ทีมสีแดง</h4>
                  </div>
                ` : ''}

                ${myTeam === 'blue' ? `
                  <div class="bg-blue-600 border-4 border-blue-400 text-white p-6 rounded-3xl shadow-xl transform -rotate-1">
                    <span class="text-xs uppercase block tracking-widest text-blue-100 mb-1 font-bold">ฝั่งทีมของคุณคือ</span>
                    <h4 className="text-4xl font-black">🔵 ทีมสีน้ำเงิน</h4>
                  </div>
                ` : ''}

                ${!myTeam ? `
                  <div class="bg-[#FAF7F2] p-6 rounded-3xl border border-[#EADBC8] animate-pulse text-slate-500 flex flex-col items-center gap-2">
                    <span>⏳ กำลังดึงรายชื่อเข้าทีม...</span>
                  </div>
                ` : ''}
              </div>

              <div class="bg-[#FAF7F2] p-3 rounded-xl text-xs text-slate-600 flex items-center justify-center gap-1 border border-[#EADBC8]">
                <span>⭐ คะแนนสะสมทั้งหมด:</span>
                <span class="font-bold text-yellow-600 text-sm">${playersList.find(p => p.id === user.uid)?.score || 0} pt</span>
              </div>
            </div>
          `;
        }

        mainHtml += `</div>`;
      } else {
        // Loading state
        mainHtml += `
          <div class="text-center py-20 animate-pulse">
            <span class="text-6xl block mb-4">⚡</span>
            <h2 class="text-2xl font-bold text-[#013220]">กำลังติดต่อฐานข้อมูลเรียลไทม์...</h2>
            <p class="text-xs text-slate-500 mt-2">โปรดรอสักครู่ ระบบกำลังจัดเตรียมสัญญาณคลาวด์</p>
          </div>
        `;
      }

      mainHtml += `</main>`;

      // 3. FOOTER HTML
      let footerHtml = `
        <footer class="bg-[#013220] py-3 text-center text-xs text-slate-300 shrink-0">
          © 2026 YeS Spot It Game — Yuwapat Early Childhood School
        </footer>
      `;

      rootEl.innerHTML = headerHtml + mainHtml + footerHtml;

      // Bind click handler dynamically to interactive panel SVG if present
      const interactivePanel = document.getElementById('interactive-panel-container');
      if (interactivePanel) {
        interactivePanel.addEventListener('click', handleSpotImageClick);
      }
    }

    // --- FIREBASE INITIALIZATION & AUTHENTICATION BOOTSTRAP ---
    (async function bootstrap() {
      try {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();

        await auth.signInAnonymously();
        auth.onAuthStateChanged((currentUser) => {
          user = currentUser;
          
          // Parse Query Params once auth is set up
          const params = new URLSearchParams(window.location.search);
          const roomParam = params.get('room');
          if (roomParam) {
            updateState({ roomCode: roomParam.toUpperCase(), isScanAccess: true });
          } else {
            renderApp();
          }
        });
      } catch (e) {
        console.error("Firebase startup crash", e);
        document.getElementById('root').innerHTML = `
          <div class="p-6 text-red-600 bg-red-50 border border-red-200 rounded-xl m-4 text-center">
            <p class="font-bold">เกิดข้อผิดพลาดในการโหลดระบบคลาวด์ Firebase:</p>
            <p class="text-xs font-mono mt-2">${e.message}</p>
          </div>
        `;
      }
    })();
  </script>

</body>
</html>
